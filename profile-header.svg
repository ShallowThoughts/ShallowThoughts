  </text>

  <text x="170" y="224" fill="#ffffff" fill-opacity="0.88" font-family="Segoe UI Emoji, Segoe UI, Arial, sans-serif" font-size="20">🌸</text>
  <text x="805" y="224" fill="#ffffff" fill-opacity="0.88" font-family="Segoe UI Emoji, Segoe UI, Arial, sans-serif" font-size="20">🎮</text>
  <path d="M210 220 C330 244, 670 244, 790 220" stroke="#ffffff" stroke-opacity="0.45" stroke-width="3" stroke-linecap="round"/>
