<svg width="1000" height="260" viewBox="0 0 1000 260" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1000" y2="260" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ffb7d5"/>
      <stop offset="0.52" stop-color="#c7d2fe"/>
      <stop offset="1" stop-color="#8bd3ff"/>
    </linearGradient>
    <radialGradient id="glow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(760 48) rotate(130) scale(360 260)">
      <stop stop-color="#ffffff" stop-opacity="0.76"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="16" stdDeviation="18" flood-color="#5b5f97" flood-opacity="0.22"/>
    </filter>
  </defs>

  <rect width="1000" height="260" rx="32" fill="url(#bg)"/>
  <rect width="1000" height="260" rx="32" fill="url(#glow)"/>

  <circle cx="105" cy="70" r="88" fill="#fff" fill-opacity="0.22"/>
  <circle cx="912" cy="202" r="108" fill="#fff" fill-opacity="0.16"/>
  <circle cx="820" cy="64" r="36" fill="#fff" fill-opacity="0.18"/>

  <g filter="url(#softShadow)">
    <rect x="96" y="55" width="808" height="150" rx="30" fill="#ffffff" fill-opacity="0.30"/>
    <rect x="97" y="56" width="806" height="148" rx="29" stroke="#ffffff" stroke-opacity="0.42" stroke-width="2"/>
  </g>

  <text x="500" y="122" text-anchor="middle" fill="#ffffff" font-family="Segoe UI, Arial, sans-serif" font-size="56" font-weight="800" letter-spacing="1.5">
